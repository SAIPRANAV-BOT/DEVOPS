<!DOCTYPE html>
<html >
<head>
    <title> FASTA PARSER</title>
</head>
<body>
    <h2>FASTA PARSER</h2>
    <textarea id="input" rows="10" cols="50" placeholder="Enter FASTA formatted data here..."></textarea><br>
    <button onclick="parseFasta()">Parse FASTA</button>
    <hr>
    <h3>Parsed Output:</h3>
    <div id="output"></div>

    <script>
        function parseFasta() {
            let fasta = document.getElementById("input").value;
            fetch("/parse", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ fasta: fasta })
            })
            .then(function(response) {
                return response.json();
            })
            .then(function(data){
                let output = `<p>Number of sequences: ${data.count}</p>`;
                data.sequences.forEach(seq => {
                    output += `
                        <p><strong>${seq.id}</strong> (Length: ${seq.length})</p>
                        <p>${seq.sequence}</p>
                    `;
                });
                document.getElementById("output").innerHTML = output;
            });
        }
    </script>
</body>
</html>
